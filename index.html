<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Queue Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Music Queue Dashboard</h1>
</header>

<main>

<div class="song">
<img src="cover.jpg" class="cover">
<div class="meta">
<div class="title">If We Were Vampires</div>
<div class="artist">Noah Kahan</div>
<button class="lyricsBtn"
data-lyrics="https://genius.com/Jason-isbell-if-we-were-vampires-lyrics">
Lyrics
</button>
</div>
</div>

</main>

<div id="lyricsModal" class="modal hidden">
<div class="modalContent">

<div class="modalHeader">
<span id="lyricsTitle"></span>
<button id="closeLyrics">✕</button>
</div>

<div id="lyricsEmbedMount"></div>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
